<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
  // GitHub Pages SPA redirect — encodes the path into a query string
  // so the root index.html can restore it via history.replaceState.
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 2).join('/') + '/?p=' +
    l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
    (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</body>
</html>
