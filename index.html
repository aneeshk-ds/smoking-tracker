<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07070f" />
    <meta name="description" content="A quiet tracker for the habit you're working on." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Smoking Tracker" />
    <script>(function(){try{var p=localStorage.getItem('st_theme')||'system';var d=(p==='light'||p==='dark')?p:((window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');document.documentElement.setAttribute('data-theme',d);}catch(e){}})();</script>
    <script>
      // Restore path encoded by public/404.html for GitHub Pages SPA routing
      (function () {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        var q = window.location.search.match(/[?&]q=([^&]*)/);
        if (p) {
          window.history.replaceState(
            null, null,
            '/' + p[1].replace(/~and~/g, '&') +
            (q ? '?' + q[1].replace(/~and~/g, '&') : '') +
            window.location.hash
          );
        }
      })();
    </script>
    <title>Smoking Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
