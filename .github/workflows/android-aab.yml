name: Build Android AAB (TWA)

# Manual trigger — produces a signed .aab you download from the run's Artifacts.
# Requires repo secrets (Settings → Secrets → Actions):
#   UPLOAD_KEYSTORE_BASE64  – base64 of your upload-keystore.jks
#   KEYSTORE_PASSWORD       – keystore password
#   KEY_PASSWORD            – key (alias) password
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: android } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Restore upload keystore
        run: echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks

      - name: Generate Android project from twa-manifest.json
        run: bubblewrap update --skipVersionUpgrade

      - name: Build signed AAB
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoking-tracker-android
          path: |
            android/app-release-bundle.aab
            android/app-release-signed.apk
            android/assetlinks.json
          if-no-files-found: warn
